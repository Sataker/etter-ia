<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  
  <!-- Diamond shape - lines -->
  <path d="M50 10 L90 50 L50 90 L10 50 Z" fill="none" stroke="url(#grad)" stroke-width="4"/>
  
  <!-- Corner circles -->
  <circle cx="50" cy="10" r="8" fill="url(#grad)"/>
  <circle cx="90" cy="50" r="8" fill="url(#grad)"/>
  <circle cx="50" cy="90" r="8" fill="url(#grad)"/>
  <circle cx="10" cy="50" r="8" fill="url(#grad)"/>
  
  <!-- Center circle -->
  <circle cx="50" cy="50" r="10" fill="url(#grad)"/>
  
  <!-- Horizontal line from center to right -->
  <line x1="60" y1="50" x2="82" y2="50" stroke="url(#grad)" stroke-width="4"/>
</svg>
